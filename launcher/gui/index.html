<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Launcher Local</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .scale-in {
            animation: scaleIn 0.2s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="min-h-screen p-8">

    <div class="title-bar">
        <div class="drag-region pywebview-drag-region"></div>

        <div class="window-controls">
            <button title="Minimizar" onclick="window.pywebview.api.minimize()" class="control-btn hover:bg-slate-700">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect fill="currentColor" width="10" height="1" x="1" y="6" />
                </svg>
            </button>
            <button id="max-btn" title="Maximize" onclick="toggleMaxIcon()" class="control-btn hover:bg-slate-700">
                <span id="max-icon-container">
                    <svg width="12" height="12" viewBox="0 0 12 12">
                        <rect width="9" height="9" x="1.5" y="1.5" fill="none" stroke="currentColor" stroke-width="1" />
                    </svg>
                </span>
            </button>
            <button title="Fechar" onclick="window.pywebview.api.close()"
                class="control-btn hover:bg-red-500 rounded-tr-xl overflow-hidden group">
                <svg width="14" height="14" viewBox="0 0 12 12">
                    <path d="M2 2l8 8m0-8l-8 8" fill="none" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </div>

    <div class="no-drag-region">

        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Minha Biblioteca</h1>
                <p class="text-slate-400 text-sm">Gerencie seus jogos locais</p>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex gap-3 border-r border-slate-700/50 pr-4">
                    <button id="grid-view" onclick="toggleViewMode()" title="Alterar Visualização"
                        class="btn-nav transition hover:opacity-80 active:scale-95 outline-none flex items-center justify-center">
                        <svg width="32px" height="32px" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg" id="list-view-svg">
                            <g stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">

                                <rect x="3" y="3" width="7" height="9" rx="2" />

                                <rect x="3" y="15" width="7" height="5" rx="2" />

                                <rect x="14" y="11" width="7" height="9" rx="2" />

                                <rect x="14" y="3" width="7" height="5" rx="2" />
                            </g>
                        </svg>
                    </button>
                    <button onclick="handleAction('ADD_GAME')"
                        class="bg-transparent border border-slate-700 text-slate-400 p-2 px-6 rounded-lg font-bold transition-all duration-300 hover:bg-blue-600/10 hover:border-blue-500 hover:text-white hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] active:scale-95">
                        + Adicionar Jogo
                    </button>
                </div>

                <button onclick="window.toggleSettings()" id="configuration-button"
                    class="bg-transparent border border-slate-700 text-slate-400 p-2 px-6 rounded-lg font-bold transition-all duration-300 hover:bg-blue-600/10 hover:border-blue-500 hover:text-white hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] active:scale-95"
                    title="Configurações">
                    <span>
                        <svg fill="currentColor" width="18px" height="18px" viewBox="0 0 200 200" data-name="Layer 1"
                            id="Layer_1" xmlns="http://www.w3.org/2000/svg">
                            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                            <g id="SVGRepo_iconCarrier">
                                <title></title>
                                <path
                                    d="M36.5,75C41,89.5,54,100,70,100s29-10.5,33.5-25H170a10,10,0,0,0,0-20H103.5C99,40.5,86,30,70,30S41,40.5,36.5,55H25a10,10,0,0,0,0,20ZM70,50A15,15,0,1,1,55,65,14.73,14.73,0,0,1,70,50Zm105,75H163.5C159,110.5,146,100,130,100s-29,10.5-33.5,25H30a10,10,0,0,0,0,20H96.5c4.5,14.5,17.5,25,33.5,25s29-10.5,33.5-25H175a10,10,0,0,0,0-20Zm-45,25a15,15,0,1,1,15-15A14.73,14.73,0,0,1,130,150Z">
                                </path>
                            </g>
                        </svg> </span>
                    <span class="hidden md:inline font-medium">Configurações</span>
                </button>
            </div>
        </header>

        <div class="flex items-center justify-end w-full px-6 py-4 bg-slate-900/30 border-b border-slate-800/50 gap-4">
            <div id="search-wrapper"
                class="group relative flex items-center bg-slate-800/50 rounded-full px-3 py-1.5 transition-all duration-300 w-10 overflow-hidden border border-slate-700/50 hover:border-blue-500/50 cursor-pointer">
                <span class="text-slate-400 select-none">
                    <svg width="18px" height="18px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path d="M14 5H20" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round"></path>
                            <path d="M14 8H17" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round"></path>
                            <path d="M21 11.5C21 16.75 16.75 21 11.5 21C6.25 21 2 16.75 2 11.5C2 6.25 6.25 2 11.5 2"
                                stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                            <path d="M22 22L20 20" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round"></path>
                        </g>
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="Buscar jogo..."
                    class="bg-transparent border-none outline-none text-sm text-white ml-2 w-0 transition-all duration-300 opacity-0">
            </div>

            <div class="relative inline-block text-left" id="sort-dropdown-container">
                <button onclick="toggleSortMenu(event)" id="sort-button"
                    class="bg-slate-800 text-white text-sm rounded-lg border border-slate-700 outline-none p-1.5 cursor-pointer hover:bg-blue-600 hover:border-blue-500 transition px-4 flex items-center gap-2">
                    <span id="sort-selected-label">A - Z</span>
                    <span class="text-xs opacity-50">▼</span>
                </button>

                <div id="sort-menu"
                    class="hidden absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-lg shadow-2xl py-2 text-sm text-white z-[60] animate-in fade-in zoom-in duration-200 shadow-[0_0_15px_rgba(59,130,246,0.3)]">

                    <button onclick="selectSort('az', 'A - Z')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 transition">A - Z</button>
                    <button onclick="selectSort('za', 'Z - A')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 transition">Z - A</button>
                    <button onclick="selectSort('size-desc', 'Maior Tamanho')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 transition">Maior Tamanho</button>
                    <button onclick="selectSort('size-asc', 'Menor Tamanho')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 transition">Menor Tamanho</button>
                </div>
            </div>
        </div>


        <main id="game-library"
            class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-4 p-6">
        </main>

        <div id="loader"
            class="hidden fixed inset-0 bg-black/50 flex items-center justify-center backdrop-blur-sm z-50">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <p class="animate-pulse">Carregando...</p>
            </div>
        </div>

        <div id="options-menu"
            class="hidden absolute z-50 w-56 bg-slate-800 border border-slate-700 rounded-lg shadow-2xl py-2 text-sm text-white animate-in fade-in zoom-in duration-200">

            <div class="relative group">
                <button
                    class="w-full text-left px-4 py-2 hover:bg-blue-600 flex items-center justify-between transition">
                    <div class="flex items-center gap-2">
                        <span>
                            <svg width="18px" height="18px" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <path
                                        d="M7 11C8.10457 11 9 10.1046 9 9C9 7.89543 8.10457 7 7 7C5.89543 7 5 7.89543 5 9C5 10.1046 5.89543 11 7 11Z"
                                        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                    </path>
                                    <path d="M5.56055 21C11.1305 11.1 15.7605 9.35991 21.0005 15.7899" stroke="#ffffff"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                    <path
                                        d="M14.35 3H5C3.93913 3 2.92172 3.42136 2.17157 4.17151C1.42142 4.92165 1 5.93913 1 7V17C1 18.0609 1.42142 19.0782 2.17157 19.8284C2.92172 20.5785 3.93913 21 5 21H17C18.0609 21 19.0783 20.5785 19.8284 19.8284C20.5786 19.0782 21 18.0609 21 17V9"
                                        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                    </path>
                                    <path
                                        d="M22.3098 3.16996L17.2098 8.26005C16.7098 8.77005 15.2098 8.99996 14.8698 8.66996C14.5298 8.33996 14.7598 6.82999 15.2698 6.31999L20.3599 1.23002C20.6171 0.964804 20.9692 0.812673 21.3386 0.807047C21.7081 0.80142 22.0646 0.942731 22.3298 1.19999C22.5951 1.45725 22.7472 1.8093 22.7529 2.17875C22.7585 2.5482 22.6171 2.90475 22.3599 3.16996H22.3098Z"
                                        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                    </path>
                                </g>
                            </svg>
                        </span> Alterar Capa
                    </div>
                    <span>❯</span>
                </button>

                <div id="cover-submenu"
                    class="absolute left-[105%] top-0 w-48 bg-slate-800 border border-slate-700 rounded-lg shadow-2xl py-2 hidden group-hover:block z-50">
                    <button onclick="window.handleCoverChoice('online')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 flex items-center gap-2 transition">
                        <span>🔍</span> Buscar Online
                    </button>
                    <button onclick="window.handleCoverChoice('local')"
                        class="w-full text-left px-4 py-2 hover:bg-blue-600 flex items-center gap-2 transition border-t border-slate-700/50">
                        <span>📁</span> Arquivo Local
                    </button>
                </div>
            </div>

            <hr class="my-2 border-slate-700/50">

            <button onclick="window.renameGame()"
                class="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 transition text-slate-300">
                <span>
                    <svg width="18px" height="18px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path opacity="0.15" d="M8 16H12L18 10L14 6L8 12V16Z" fill="#ffffff"></path>
                            <path d="M14 6L8 12V16H12L18 10M14 6L17 3L21 7L18 10M14 6L18 10M10 4L4 4L4 20L20 20V14"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                        </g>
                    </svg>
                </span> Mudar nome do jogo
            </button>

            <button onclick="window.removeGame('launcher')"
                class="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 transition text-slate-300">
                <span>
                    <svg width="18px" height="18px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path
                                d="M11 15L9 13M9 13L11 11M9 13H12C12.9319 13 13.3978 13 13.7654 13.1522C14.2554 13.3552 14.6448 13.7446 14.8478 14.2346C15 14.6022 15 15.0681 15 16M18 6L17.1991 18.0129C17.129 19.065 17.0939 19.5911 16.8667 19.99C16.6666 20.3412 16.3648 20.6235 16.0011 20.7998C15.588 21 15.0607 21 14.0062 21H9.99377C8.93927 21 8.41202 21 7.99889 20.7998C7.63517 20.6235 7.33339 20.3412 7.13332 19.99C6.90607 19.5911 6.871 19.065 6.80086 18.0129L6 6M4 6H20M16 6L15.7294 5.18807C15.4671 4.40125 15.3359 4.00784 15.0927 3.71698C14.8779 3.46013 14.6021 3.26132 14.2905 3.13878C13.9376 3 13.523 3 12.6936 3H11.3064C10.477 3 10.0624 3 9.70951 3.13878C9.39792 3.26132 9.12208 3.46013 8.90729 3.71698C8.66405 4.00784 8.53292 4.40125 8.27064 5.18807L8 6"
                                stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </g>
                    </svg>
                </span> Remover do Launcher
            </button>

            <button onclick="window.removeGame('full')" id="trash-button"
                class="w-full text-left px-4 py-2 hover:bg-slate-700 flex items-center gap-2 transition text-white">
                <span>
                    <svg width="18px" height="18px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path
                                d="M10 12L14 16M14 12L10 16M4 6H20M16 6L15.7294 5.18807C15.4671 4.40125 15.3359 4.00784 15.0927 3.71698C14.8779 3.46013 14.6021 3.26132 14.2905 3.13878C13.9376 3 13.523 3 12.6936 3H11.3064C10.477 3 10.0624 3 9.70951 3.13878C9.39792 3.26132 9.12208 3.46013 8.90729 3.71698C8.66405 4.00784 8.53292 4.40125 8.27064 5.18807L8 6M18 6V16.2C18 17.8802 18 18.7202 17.673 19.362C17.3854 19.9265 16.9265 20.3854 16.362 20.673C15.7202 21 14.8802 21 13.2 21H10.8C9.11984 21 8.27976 21 7.63803 20.673C7.07354 20.3854 6.6146 19.9265 6.32698 19.362C6 18.7202 6 17.8802 6 16.2V6"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            </path>
                        </g>
                    </svg>
                </span> Desinstalar Jogo
            </button>
        </div>

        <div id="settings-modal"
            class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl scale-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2"><span>
                            <svg fill="currentColor" width="18px" height="18px" viewBox="0 0 200 200"
                                data-name="Layer 1" id="Layer_1" xmlns="http://www.w3.org/2000/svg">
                                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <title></title>
                                    <path
                                        d="M36.5,75C41,89.5,54,100,70,100s29-10.5,33.5-25H170a10,10,0,0,0,0-20H103.5C99,40.5,86,30,70,30S41,40.5,36.5,55H25a10,10,0,0,0,0,20ZM70,50A15,15,0,1,1,55,65,14.73,14.73,0,0,1,70,50Zm105,75H163.5C159,110.5,146,100,130,100s-29,10.5-33.5,25H30a10,10,0,0,0,0,20H96.5c4.5,14.5,17.5,25,33.5,25s29-10.5,33.5-25H175a10,10,0,0,0,0-20Zm-45,25a15,15,0,1,1,15-15A14.73,14.73,0,0,1,130,150Z">
                                    </path>
                                </g>
                            </svg> </span>

                        </span> Configurações</h2>
                    <button onclick="window.toggleSettings()" class="text-slate-400 hover:text-white">&times;</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-blue-400 uppercase font-bold tracking-wider">SteamGridDB API
                            Key</label>
                        <input id="api-key-input" type="password"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mt-1 focus:border-blue-500 outline-none text-white transition-all"
                            placeholder="Insira sua chave API aqui...">
                        <p class="text-[10px] text-slate-500 mt-2">Sua chave é salva localmente em AppData e usada para
                            buscar capas online.</p>
                    </div>
                </div>

                <div class="flex gap-3 mt-8">
                    <button onclick="window.toggleSettings()"
                        class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold transition-all">
                        Cancelar
                    </button>

                    <button onclick="window.saveApiSettings()"
                        class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-all transform active:scale-95">
                        Salvar Alterações
                    </button>
                </div>
            </div>
        </div>

        <div id="notification-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3"></div>

        <div id="confirm-modal"
            class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl scale-in">
                <div class="flex items-center gap-3 mb-4">
                    <span id="confirm-icon" class="text-2xl">⚠️</span>
                    <h2 id="confirm-title" class="text-xl font-bold text-white">Confirmação</h2>
                </div>

                <p id="confirm-message" class="text-slate-300 mb-8 leading-relaxed">
                    Tem certeza que deseja realizar esta ação?
                </p>

                <input type="text" id="confirm-input"
                    class="hidden w-full bg-slate-700 border border-slate-600 rounded-lg p-2 mb-6 text-white outline-none focus:border-blue-500">

                <div class="flex gap-3">
                    <button onclick="window.closeConfirmModal()"
                        class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold transition-all text-white">
                        Cancelar
                    </button>

                    <button id="confirm-button-execute"
                        class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold transition-all transform active:scale-95 text-white">
                        Confirmar
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
