<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="copyright" content="Caio Monteiro">
    <meta name="license" content="GPL-3.0">
    <title>Intro</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-video {
            transition: opacity 0.8s ease-in-out;
            min-width: 100%;
            min-height: 100%;
           
            object-fit: contain;
        }

        .fade-out {
            opacity: 0 !important;
        }

        #skip-intro {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            user-select: none;
        }

        #skip-intro:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <video id="intro-video" autoplay muted playsinline>
            <source src="video/launcherIntro.mp4" type="video/mp4">
        </video>
        <div id="skip-intro">Pular [ESC]</div>
    </div>

    <script>
        const video = document.getElementById('intro-video');
        const skipBtn = document.getElementById('skip-intro');
        let isFinishing = false; // Evita chamadas duplicadas

        function callFinish() {
            if (isFinishing) return;
            isFinishing = true;

            video.style.transition = "opacity 0.8s ease-in-out";
            video.style.opacity = "0";

            // espera a transição visual terminar (800ms) antes de avisar o Python
            setTimeout(() => {
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.finish_intro();
                }
            }, 800);
        }

      
        video.ontimeupdate = () => {
            // Se faltar menos de 0.8s para acabar, inicia o fade-out
            if (video.duration - video.currentTime < 0.8 && !isFinishing) {
                callFinish();
            }
        };

        
        video.onended = callFinish;

        
        skipBtn.onclick = callFinish;

      
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") callFinish();
        });
    </script>

</body>

</html>
